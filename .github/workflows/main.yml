---
name: libblkid CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "CHANGES.txt"
      - "**/README.md"
  pull_request:
    branches: [master]
    paths-ignore:
      - "CHANGES.txt"
      - "**/README.md"

  workflow_dispatch:

jobs:
  checks:
    strategy:
      matrix:
        include:
          - components: rustfmt
            task: fmt-ci
          - components: clippy
            task: clippy
          - components: cargo
            task: docs-ci
          - components: cargo
            task: check-typos
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: ${{ matrix.components }}
      - name: Install dependencies
        run: |
          sudo apt-get -q update
          sudo apt-get -y install libblkid-dev
      - name: Install typos-cli if required
        run: ${{ matrix.task == 'check-typos' && 'cargo install typos-cli' || 'true' }}
      - name: Test ${{ matrix.task }} on CURRENT DEVELOPMENT RUST TOOLCHAIN
        run: make -f Makefile ${{ matrix.task }}

  # Ubuntu checks
  ubuntu-checks:
    strategy:
      matrix:
        task: [build, test]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install dependencies
        run: |
          sudo apt-get -q update
          sudo apt-get -y install libblkid-dev
      - name: Run test on CURRENT DEVELOPMENT RUST TOOLCHAIN
        run: make ${{ matrix.task }}
      - name: Install toml-cli
        run: pip install --user toml-cli
      - name: Get package MSRV
        id: msrv
        run: |
          PATH="$PATH:$(python3 -m site --user-base)/bin" MSRV=$(toml get --toml-path Cargo.toml "package.rust-version")
          echo "MSRV=$MSRV" >> "$GITHUB_OUTPUT"
      - name: Set toolchain override
        run: /home/runner/.cargo/bin/rustup override set ${{ steps.msrv.outputs.MSRV }}
      - name: Run test on LOWEST SUPPORTED RUST TOOLCHAIN
        run: make ${{ matrix.task }}

  # MacOS checks
  macos-checks:
    strategy:
      matrix:
        task: [build, test]
    env:
      PKG_CONFIG_PATH: /opt/homebrew/opt/util-linux/lib/pkgconfig
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install libblkid
        run: brew install util-linux
      - name: Run test on CURRENT DEVELOPMENT RUST TOOLCHAIN
        run: make ${{ matrix.task }}
      - name: Install toml-cli
        run: pip install --user toml-cli
      - name: Get package MSRV
        id: msrv
        run: |
          PATH="$PATH:$(python3 -m site --user-base)/bin" MSRV=$(toml get --toml-path Cargo.toml "package.rust-version")
          echo "MSRV=$MSRV" >> "$GITHUB_OUTPUT"
      - name: Set toolchain override
        run: /Users/runner/.cargo/bin/rustup override set ${{ steps.msrv.outputs.MSRV }}
      - name: Run test on LOWEST SUPPORTED RUST TOOLCHAIN
        run: make ${{ matrix.task }}

  # VERIFICATION OF TEST INFRASTRUCTURE
  yamllint:
    runs-on: ubuntu-22.04
    container:
      image: fedora:43  # CURRENT DEVELOPMENT ENVIRONMENT
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install dependencies for Fedora
        run: dnf install -y make yamllint
      - name: Run yamllint
        run: make -f Makefile yamllint
